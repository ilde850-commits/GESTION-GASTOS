<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CONTROL GASTOS BINOTTO</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2e7d32">
    <style>
        body { font-family: Arial, sans-serif; background: #f4f6f8; padding: 15px; margin: 0; }
        .card { background: white; padding: 15px; margin-top: 10px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,.1); }
        h1, h2, h3 { color: #2e7d32; }
        button { width: 100%; padding: 12px; margin-top: 8px; border: none; border-radius: 8px; background: #2e7d32; color: white; font-size: 15px; font-weight: bold; }
        button:active { background: #1b5e20; }
        input, select { width: 100%; padding: 10px; margin-top: 5px; margin-bottom: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 8px; font-size: 15px; }
        .botones { display: flex; gap: 8px; margin-top: 5px; }
        .botones button { flex: 1; margin-top: 0; }
        .btn-danger { background: #c62828; }
        .btn-danger:active { background: #b71c1c; }
        .btn-secondary { background: #757575; }
        .btn-secondary:active { background: #616161; }
        .ticket { width: 100%; margin-top: 10px; border-radius: 8px; max-height: 300px; object-fit: contain; background: #eee; }
        .oculto { display: none; }
        table { width: 100%; border-collapse: collapse; text-align: center; margin-top: 15px; margin-bottom: 15px; }
        th, td { border: 1px solid #bbb; padding: 8px; font-size: 14px; }
        th { background: #efefef; }
        .firmas { display: flex; justify-content: space-between; margin-top: 40px; text-align: center; font-size: 12px; color: #555; }
        .firmas div { flex: 1; }
        .informe-tickets { margin-top: 30px; border-top: 2px dashed #ccc; padding-top: 20px; }
        .ticket-anexo { text-align: center; margin-bottom: 30px; page-break-inside: avoid; }
        .ticket-anexo img { max-width: 100%; max-height: 450px; border: 1px solid #ddd; border-radius: 5px; margin-top: 5px; }

        @media print {
            body { background: white; padding: 0; margin: 0; }
            .card { box-shadow: none; padding: 0; margin: 0; }
            .no-print { display: none !important; }
            .salto-pagina { page-break-before: always; }
            table { page-break-inside: avoid; }
            .firmas { page-break-inside: avoid; }
        }
    </style>
</head>
<body>

    <h1 class="no-print">Gestor Gastos Binotto</h1>
    <div id="app">Cargando base de datos local...</div>

    <script>
        // --- Registrar Service Worker para funcionamiento Offline ---
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(err => console.log("SW error:", err));
        }

        // --- CONFIGURACIÓN DE INDEXEDDB (VERSIÓN CORREGIDA Y MEJORADA) ---
        let db;
        const app = document.getElementById('app');
        let viajesGlobales = []; // Corregido el espacio en blanco accidental

        function iniciarDB() {
            return new Promise((resolve, reject) => {
                let request = indexedDB.open("GastosBinottoDB", 1);
                
                request.onupgradeneeded = function(e) {
                    let database = e.target.result;
                    
                    if (!database.objectStoreNames.contains("viajes")) {
                        database.createObjectStore("viajes", { keyPath: "id", autoIncrement: true });
                    }
                    if (!database.objectStoreNames.contains("gastos")) {
                        let gStore = database.createObjectStore("gastos", { keyPath: "id", autoIncrement: true });
                        gStore.createIndex("viaje_id", "viaje_id", { unique: false });
                    }
                    console.log("Tablas inicializadas localmente.");
                };

                request.onsuccess = function(e) {
                    db = e.target.result;
                    resolve();
                };

                request.onerror = function(e) {
                    console.error("Error de IndexedDB:", e.target.error);
                    reject("Error abriendo Base de Datos local: " + e.target.error.message);
                };

                request.onblocked = function() {
                    alert("La base de datos está bloqueada por otra pestaña abierta. Reinicia la app.");
                };
            });
        }

        // --- FUNCIONES CRUD REEMPLAZANDO LOS FETCH ---
        function obtenerViajes(activo) {
            return new Promise((resolve) => {
                let tx = db.transaction("viajes", "readonly");
                let store = tx.objectStore("viajes");
                let request = store.openCursor(null, "prev");
                let resultados = [];

                request.onsuccess = function(e) {
                    let cursor = e.target.result;
                    if (cursor) {
                        if (cursor.value.activo === activo) {
                            resultados.push(cursor.value);
                        }
                        cursor.continue();
                    } else {
                        resolve(resultados);
                    }
                };
            });
        }

        function obtenerViajePorId(id) {
            return new Promise(res => {
                db.transaction("viajes").objectStore("viajes").get(id).onsuccess = e => res(e.target.result);
            });
        }

        function obtenerGastosPorViaje(viajeId) {
            return new Promise((resolve) => {
                let tx = db.transaction("gastos", "readonly");
                let index = tx.objectStore("gastos").index("viaje_id");
                let request = index.openCursor(IDBKeyRange.only(viajeId));
                let resultados = [];

                request.onsuccess = function(e) {
                    let cursor = e.target.result;
                    if (cursor) {
                        resultados.push(cursor.value);
                        cursor.continue();
                    } else {
                        resultados.sort((a, b) => new Date(b.fecha) - new Date(a.fecha));
                        resolve(resultados);
                    }
                };
            });
        }

        // --- VISTAS Y PANTALLAS ---
        async function cargarDatos() {
            try {
                await iniciarDB();
                viajesGlobales = await obtenerViajes(1);
                pantallaInicio();
            } catch (error) {
                app.innerHTML = `<div class="card"><p style="color:red; font-weight:bold;">${error}</p><button onclick="location.reload()">Reintentar Carga</button></div>`;
            }
        }

        function pantallaInicio() {
            let html = `
            <div class="card">
                <button onclick="nuevoViaje()">+ Nuevo viaje</button>
                <button class="btn-secondary" onclick="verArchivados()">Ver Archivados</button>
                <button onclick="exportarCopiaSeguridad()" style="background-color: #0288d1; color: white;">💾 Copia Seguridad (JSON)</button>
                <button onclick="importarCopiaSeguridad()" style="background-color: #7b1fa2; color: white; margin-top:8px;">📂 Importar Copia</button>
            </div>`;

            if (viajesGlobales.length === 0) {
                html += `<div class="card" style="text-align:center; color:#666;"><p>No hay viajes activos en este momento.</p></div>`;
            }

            viajesGlobales.forEach(v => {
                html += `
                <div class="card">
                    <h2 style="margin-top:0; margin-bottom:5px;">${v.nombre}</h2>
                    <small style="color:#555;">${v.inicio} hasta ${v.fin}</small><br>
                    <p style="margin: 8px 0;"><b>KM inicial:</b> ${v.km} km</p>
                    <div class="botones">
                        <button onclick="abrirViaje(${v.id})">Ver Gastos</button>
                        <button class="btn-secondary" onclick="archivarViaje(${v.id})">Archivar</button>
                    </div>
                    <div class="botones" style="margin-top:8px;">
                        <button class="btn-secondary" onclick="editarViaje(${v.id})">Editar</button>
                        <button class="btn-danger" onclick="borrarViaje(${v.id})">Borrar</button>
                    </div>
                </div>`;
            });
            app.innerHTML = html;
        }

        async function abrirViaje(id) {
            let viaje = await obtenerViajePorId(id);
            let gastos = await obtenerGastosPorViaje(id);

            let html = `
            <div class="card">
                <button class="btn-secondary" onclick="cargarDatos()">← Volver al Inicio</button>
                <h2>Viaje: ${viaje.nombre}</h2>
                <div class="botones">
                    <button onclick="nuevoGasto(${id})">+ Añadir Gasto</button>
                    <button onclick="verInforme(${id})" style="background:#1565c0;">Generar Informe</button>
                </div>
            </div>`;

            if (gastos.length === 0) {
                html += `<div class="card" style="text-align:center; color:#666;"><p>No hay gastos registrados en este viaje.</p></div>`;
            }

            gastos.forEach(g => {
                html += `
                <div class="card">
                    <div style="display:flex; justify-content:space-between;">
                        <b>${g.fecha} - ${g.concepto}</b>
                        <b style="color:#2e7d32; font-size:16px;">${parseFloat(g.importe).toFixed(2)} €</b>
                    </div>
                    <small style="color:#555;">Método: ${g.pago}</small>
                    ${g.km ? `<br><small><b>KM Repostaje:</b> ${g.km} km</small>` : ''}
                    ${g.observaciones ? `<p style="margin:5px 0; background:#f0f0f0; padding:5px; border-radius:4px;">${g.observaciones}</p>` : ''}
                    ${g.foto ? `<img class="ticket" src="${g.foto}">` : ''}
                    <div class="botones" style="margin-top:10px;">
                        <button class="btn-secondary" onclick="editarGastoForm(${g.id},${id})">Editar</button>
                        <button class="btn-danger" onclick="borrarGasto(${g.id},${id})">Borrar</button>
                    </div>
                </div>`;
            });
            app.innerHTML = html;
        }

        async function verInforme(id) {
            let viaje = await obtenerViajePorId(id);
            let gastos = await obtenerGastosPorViaje(id);
            let conceptos = ["GAS", "SOLRED", "HOTEL", "RESTAURACION", "TAXI", "COCHE", "VUELOS", "PARKING", "OTROS"];
            
            let filas = "";
            let totalTarjeta = 0;
            let totalMetalico = 0;
            let htmlTickets = "";
            let categoriasTotales = {};

            gastos.forEach(g => {
                categoriasTotales[g.concepto] = (categoriasTotales[g.concepto] || 0) + parseFloat(g.importe);
            });

            conceptos.forEach(c => {
                let totalRow = categoriasTotales[c] || 0;
                let tarjeta = 0;
                let metalico = 0;

                gastos.forEach(g => {
                    if (g.concepto == c) {
                        let importe = parseFloat(g.importe) || 0;
                        if (c == "SOLRED" || c == "HOTEL") {
                            tarjeta += importe;
                        } else {
                            if (g.pago == "TARJETA") tarjeta += importe;
                            else metalico += importe;
                        }
                    }
                });

                if (c !== "SOLRED" && c !== "HOTEL") {
                    totalTarjeta += tarjeta;
                    totalMetalico += metalico;
                }

                if (totalRow > 0 || tarjeta > 0 || metalico > 0) {
                    filas += `
                    <tr>
                        <td><b>${c}</b></td>
                        <td>${metalico.toFixed(2)}€</td>
                        <td>${tarjeta.toFixed(2)}€</td>
                        <td style="background:#e8f5e9;"><b>${totalRow.toFixed(2)}€</b></td>
                    </tr>`;
                }
            });

            let sumaTotalesColumnas = totalMetalico + totalTarjeta;

            gastos.forEach(g => {
                if (g.foto) { 
                    htmlTickets += `
                    <div class="ticket-anexo">
                        <p style="margin:5px 0; font-weight:bold; color:#333;">Ticket: ${g.concepto} - ${g.fecha} - ${parseFloat(g.importe).toFixed(2)}€</p>
                        ${g.observaciones ? `<p style="margin:2px 0; font-size:12px; color:#666;">Obs: ${g.observaciones}</p>` : ''}
                        <img src="${g.foto}">
                    </div>`;
                }
            });

            let kmHTML = "";
            let repostajes = gastos.filter(g => (g.concepto == "GAS" || g.concepto == "SOLRED") && g.km);
            repostajes.forEach((g, i) => {
                kmHTML += `<p style="margin:4px 0;">Repostaje ${i + 1} (${g.fecha}): <b>${g.km} km</b></p>`;
            });

            app.innerHTML = `
            <div class="card">
                <div class="botones no-print">
                    <button class="btn-secondary" onclick="abrirViaje(${id})">← Volver al Viaje</button>
                    <button onclick="window.print()" style="background:#e65100;">🖨️ Imprimir / Guardar PDF</button>
                </div>
                
                <h1 style="text-align:center; font-size:20px; margin-top:15px; margin-bottom:5px;">INFORME DE GASTOS</h1>
                <p style="margin:4px 0;"><b>Viaje:</b> ${viaje.nombre}</p>
                <p style="margin:4px 0;"><b>Periodo:</b> ${viaje.inicio} - ${viaje.fin}</p>
                <p style="margin:4px 0;"><b>Generado:</b> ${new Date().toLocaleDateString()}</p>
                <p style="margin:4px 0;"><b>Comercial:</b> Ildefonso Alcalá</p>
                
                <table>
                    <tr>
                        <th>Concepto</th><th>Metálico</th><th>Tarjeta</th><th>Total</th>
                    </tr>
                    ${filas ? filas : '<tr><td colspan="4">No hay gastos registrados</td></tr>'}
                    <tr style="background:#c8e6c9;">
                        <th>TOTALES</th>
                        <th>${totalMetalico.toFixed(2)}€</th>
                        <th>${totalTarjeta.toFixed(2)}€</th>
                        <th>${sumaTotalesColumnas.toFixed(2)}€</th>
                    </tr>
                </table>
                
                <h3>Kilometraje</h3>
                <p style="margin:4px 0;"><b>KM inicio viaje:</b> ${viaje.km} km</p>
                ${kmHTML ? kmHTML : '<p style="color:#777; font-size:13px;">No se registraron km de repostajes.</p'}
                
                <div class="firmas">
                    <div>COMERCIAL<br><br><br>__________</div>
                    <div>ADMINISTRACIÓN<br><br><br>__________</div>
                    <div>GERENCIA<br><br><br>__________</div>
                </div>

                ${htmlTickets ? `
                <div class="informe-tickets salto-pagina">
                    <h2 style="text-align:center; border-bottom:2px solid #2e7d32; padding-bottom:5px;">ANEXO: COMPROBANTES Y TICKETS</h2>
                    ${htmlTickets}
                </div>` : ''}
            </div>`;
        }

        function nuevoViaje() {
            app.innerHTML = `
            <div class="card">
                <h2>Nuevo viaje</h2>
                <label>Nombre del Viaje / Destino</label>
                <input id="nombre" placeholder="Ej. Ruta Andalucía Mayo">
                <label>Fecha inicio</label>
                <input type="date" id="inicio">
                <label>Fecha fin</label>
                <input type="date" id="fin">
                <label>KM inicial del vehículo</label>
                <input type="number" id="v_km" value="0">
                <button onclick="guardarViaje()">Guardar Viaje</button>
                <button class="btn-secondary" onclick="cargarDatos()">Cancelar</button>
            </div>`;
            document.getElementById('inicio').value = new Date().toISOString().split("T")[0];
            document.getElementById('fin').value = new Date().toISOString().split("T")[0];
        }

        async function guardarViaje() {
            let nombre = document.getElementById('nombre').value;
            if(!nombre) { alert("Por favor, introduce el nombre del viaje"); return; }

            let nuevo = {
                nombre: nombre,
                inicio: document.getElementById('inicio').value,
                fin: document.getElementById('fin').value,
                km: parseInt(document.getElementById('v_km').value) || 0,
                activo: 1
            };

            let tx = db.transaction("viajes", "readwrite");
            tx.objectStore("viajes").add(nuevo);
            tx.oncomplete = () => cargarDatos();
        }

        function nuevoGasto(viajeId) {
            let hoy = new Date().toISOString().split("T")[0];
            app.innerHTML = `
            <div class="card">
                <button class="btn-secondary" onclick="abrirViaje(${viajeId})">← Volver</button>
                <h2>Añadir gasto</h2>
                <label>Fecha</label>
                <input type="date" id="fecha" value="${hoy}">
                <label>Concepto</label>
                <select id="concepto" onchange="controlKM()">
                    <option>GAS</option><option>SOLRED</option><option>HOTEL</option>
                    <option>RESTAURACION</option><option>TAXI</option><option>COCHE</option>
                    <option>VUELOS</option><option>PARKING</option><option>OTROS</option>
                </select>
                <label>Método de Pago</label>
                <select id="pago">
                    <option>TARJETA</option><option>METALICO</option>
                </select>
                <label>Importe (€)</label>
                <input type="number" step="0.01" id="importe" placeholder="0.00">
                <div id="kmzona" class="oculto">
                    <label>Kilómetros actuales del coche</label>
                    <input type="number" id="g_km" placeholder="Ej. 142300">
                </div>
                <label>Observaciones</label>
                <input id="obs" placeholder="Opcional...">
                <label>Foto del ticket / factura</label>
                <input type="file" id="foto" accept="image/*" capture="environment">
                <button onclick="guardarGasto(${viajeId})">Guardar Gasto</button>
            </div>`;
            controlKM();
        }

        function controlKM() {
            let concepto = document.getElementById('concepto').value;
            let kmzona = document.getElementById('kmzona');
            if (concepto == "GAS" || concepto == "SOLRED") {
                kmzona.classList.remove("oculto");
            } else {
                kmzona.classList.add("oculto");
            }
        }

        async function guardarGasto(viajeId) {
            let importeElement = document.getElementById('importe');
            if(!importeElement.value || parseFloat(importeElement.value) <= 0) {
                alert("Introduce un importe válido."); return;
            }

            let fotoInput = document.getElementById('foto');
            let fotoBase64 = null;

            if (fotoInput.files[0]) {
                app.innerHTML = `<div class="card" style="text-align:center;"><p>⚙️ Optimizando y guardando imagen en el móvil...</p></div>`;
                try {
                    let blobComprimido = await procesarYComprimirImagen(fotoInput.files[0]);
                    fotoBase64 = await blobToBase64(blobComprimido);
                } catch (e) {
                    console.error(e);
                }
            }

            let nuevoGastoObj = {
                viaje_id: viajeId,
                fecha: document.getElementById('fecha').value,
                concepto: document.getElementById('concepto').value,
                pago: document.getElementById('pago').value,
                importe: parseFloat(importeElement.value),
                km: document.getElementById('g_km').value ? parseInt(document.getElementById('g_km').value) : null,
                observaciones: document.getElementById('obs').value,
                foto: fotoBase64
            };

            let tx = db.transaction("gastos", "readwrite");
            tx.objectStore("gastos").add(nuevoGastoObj);
            tx.oncomplete = () => abrirViaje(viajeId);
        }

        function procesarYComprimirImagen(file) {
            return new Promise((resolve, reject) => {
                let reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = function (event) {
                    let img = new Image();
                    img.src = event.target.result;
                    img.onload = function () {
                        let canvas = document.createElement('canvas');
                        let max_size = 1000; 
                        let width = img.width;
                        let height = img.height;

                        if (width > height) {
                            if (width > max_size) { height *= max_size / width; width = max_size; }
                        } else {
                            if (height > max_size) { width *= max_size / height; height = max_size; }
                        }
                        canvas.width = width; canvas.height = height;
                        let ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        canvas.toBlob(blob => blob ? resolve(blob) : reject("Error blob"), 'image/jpeg', 0.6);
                    };
                };
            });
        }

        function blobToBase64(blob) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onloadend = () => resolve(reader.result);
                reader.readAsDataURL(blob);
            });
        }

        async function editarViaje(id) {
            let v = await obtenerViajePorId(id);
            app.innerHTML = `
            <div class="card">
                <h2>Editar viaje</h2>
                <label>Nombre del Viaje</label>
                <input id="nombre" value="${v.nombre}">
                <label>Fecha inicio</label>
                <input type="date" id="inicio" value="${v.inicio}">
                <label>Fecha fin</label>
                <input type="date" id="fin" value="${v.fin}">
                <label>KM inicial</label>
                <input type="number" id="v_km" value="${v.km}">
                <button onclick="actualizarViaje(${id})">Actualizar Viaje</button>
                <button class="btn-secondary" onclick="cargarDatos()">Cancelar</button>
            </div>`;
        }

        function actualizarViaje(id) {
            let tx = db.transaction("viajes", "readwrite");
            let store = tx.objectStore("viajes");
            store.get(id).onsuccess = (e) => {
                let data = e.target.result;
                data.nombre = document.getElementById('nombre').value;
                data.inicio = document.getElementById('inicio').value;
                data.fin = document.getElementById('fin').value;
                data.km = parseInt(document.getElementById('v_km').value) || 0;
                store.put(data);
            };
            tx.oncomplete = () => cargarDatos();
        }

        async function archivarViaje(id) {
            let tx = db.transaction("viajes", "readwrite");
            let store = tx.objectStore("viajes");
            store.get(id).onsuccess = (e) => {
                let data = e.target.result;
                data.activo = 0;
                store.put(data);
            };
            tx.oncomplete = () => cargarDatos();
        }

        async function borrarViaje(id) {
            if (!confirm("¿ATENCIÓN PERMANENTE? Borrar el viaje eliminará todos sus gastos y fotos locales.")) return;
            
            let tx = db.transaction(["viajes", "gastos"], "readwrite");
            tx.objectStore("viajes").delete(id);
            
            let index = tx.objectStore("gastos").index("viaje_id");
            index.openCursor(IDBKeyRange.only(id)).onsuccess = function(e) {
                let cursor = e.target.result;
                if (cursor) {
                    cursor.delete();
                    cursor.continue();
                }
            };
            tx.oncomplete = () => cargarDatos();
        }

        async function editarGastoForm(gastoId, viajeId) {
            let tx = db.transaction("gastos");
            tx.objectStore("gastos").get(gastoId).onsuccess = (e) => {
                let g = e.target.result;
                app.innerHTML = `
                <div class="card">
                    <button class="btn-secondary" onclick="abrirViaje(${viajeId})">← Cancelar</button>
                    <h2>Editar gasto</h2>
                    <label>Fecha</label>
                    <input type="date" id="fecha" value="${g.fecha}">
                    <label>Concepto</label>
                    <select id="concepto" onchange="controlKM()">
                        <option ${g.concepto=='GAS'?'selected':''}>GAS</option>
                        <option ${g.concepto=='SOLRED'?'selected':''}>SOLRED</option>
                        <option ${g.concepto=='HOTEL'?'selected':''}>HOTEL</option>
                        <option ${g.concepto=='RESTAURACION'?'selected':''}>RESTAURACION</option>
                        <option ${g.concepto=='TAXI'?'selected':''}>TAXI</option>
                        <option ${g.concepto=='COCHE'?'selected':''}>COCHE</option>
                        <option ${g.concepto=='VUELOS'?'selected':''}>VUELOS</option>
                        <option ${g.concepto=='PARKING'?'selected':''}>PARKING</option>
                        <option ${g.concepto=='OTROS'?'selected':''}>OTROS</option>
                    </select>
                    <label>Pago</label>
                    <select id="pago">
                        <option ${g.pago=='TARJETA'?'selected':''}>TARJETA</option>
                        <option ${g.pago=='METALICO'?'selected':''}>METALICO</option>
                    </select>
                    <label>Importe (€)</label>
                    <input type="number" step="0.01" id="importe" value="${g.importe}">
                    <div id="kmzona" class="oculto">
                        <label>Kilómetros</label>
                        <input type="number" id="g_km" value="${g.km || ''}">
                    </div>
                    <label>Observaciones</label>
                    <input id="obs" value="${g.observaciones || ''}">
                    <button onclick="actualizarGasto(${gastoId}, ${viajeId})">Actualizar Gasto</button>
                </div>`;
                controlKM();
            };
        }

        function actualizarGasto(gastoId, viajeId) {
            let tx = db.transaction("gastos", "readwrite");
            let store = tx.objectStore("gastos");
            store.get(gastoId).onsuccess = (e) => {
                let g = e.target.result;
                g.fecha = document.getElementById('fecha').value;
                g.concepto = document.getElementById('concepto').value;
                g.pago = document.getElementById('pago').value;
                g.importe = parseFloat(document.getElementById('importe').value);
                g.km = document.getElementById('g_km').value ? parseInt(document.getElementById('g_km').value) : null;
                g.observaciones = document.getElementById('obs').value;
                store.put(g);
            };
            tx.oncomplete = () => abrirViaje(viajeId);
        }

        function borrarGasto(gastoId, viajeId) {
            if (!confirm("¿Seguro que quieres borrar este gasto?")) return;
            let tx = db.transaction("gastos", "readwrite");
            tx.objectStore("gastos").delete(gastoId);
            tx.oncomplete = () => abrirViaje(viajeId);
        }

        async function verArchivados() {
            let datos = await obtenerViajes(0);
            let html = `
            <div class="card">
                <button class="btn-secondary" onclick="cargarDatos()">← Volver al Inicio</button>
                <h2 style="color:#666;">Viajes Archivados Históricos</h2>
            </div>`;

            if (datos.length === 0) {
                html += `<div class="card" style="text-align:center; color:#666;"><p>No hay registros archivados.</p></div>`;
            }

            datos.forEach(v => {
                html += `
                <div class="card" style="opacity: 0.8; background:#fafafa;">
                    <h3 style="margin:0; color:#555;">${v.nombre}</h3>
                    <small>${v.inicio} al ${v.fin}</small><br>
                    <small><b>KM Inicial en ruta:</b> ${v.km} km</small>
                </div>`;
            });
            app.innerHTML = html;
        }

        // --- SISTEMA DE COPIAS DE SEGURIDAD LOCALES ---
        function exportarCopiaSeguridad() {
            let copia = { viajes: [], gastos: [] };
            let tx = db.transaction(["viajes", "gastos"], "readonly");
            
            tx.objectStore("viajes").getAll().onsuccess = (e) => copia.viajes = e.target.result;
            tx.objectStore("gastos").getAll().onsuccess = (e) => copia.gastos = e.target.result;
            
            tx.oncomplete = () => {
                let json = JSON.stringify(copia);
                let blob = new Blob([json], { type: "application/json" });
                let url = URL.createObjectURL(blob);
                let a = document.createElement('a');
                a.href = url;
                a.download = `Backup_Gastos_Binotto_${new Date().toISOString().split('T')[0]}.json`;
                a.click();
            };
        }

        document.addEventListener("DOMContentLoaded", () => {
            // Manejador secundario por seguridad
        });

        function importarCopiaSeguridad() {
            let input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = e => {
                let file = e.target.files[0];
                let reader = new FileReader();
                reader.onload = function(evt) {
                    let datos = JSON.parse(evt.target.result);
                    if(datos.viajes && datos.gastos) {
                        let tx = db.transaction(["viajes", "gastos"], "readwrite");
                        tx.objectStore("viajes").clear();
                        tx.objectStore("gastos").clear();
                        
                        datos.viajes.forEach(v => tx.objectStore("viajes").add(v));
                        datos.gastos.forEach(g => tx.objectStore("gastos").add(g));
                        
                        tx.oncomplete = () => {
                            alert("¡Copia de seguridad restaurada con éxito!");
                            cargarDatos();
                        };
                    } else {
                        alert("Archivo de copia no válido.");
                    }
                };
                reader.readAsText(file);
            };
            input.click();
        }

        cargarDatos();
    </script>
</body>
</html>
