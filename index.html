<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CONTROL GASTOS BINOTTO</title>
    <link class="no-print" rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2e7d32">
    <style>
        body { font-family: Arial, sans-serif; background: #f4f6f8; padding: 15px; margin: 0; }
        .card { background: white; padding: 15px; margin-top: 10px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,.1); }
        h1, h2, h3 { color: #2e7d32; }
        button { width: 100%; padding: 12px; margin-top: 8px; border: none; border-radius: 8px; background: #2e7d32; color: white; font-size: 15px; font-weight: bold; }
        button:active { background: #1b5e20; }
        input, select { width: 100%; padding: 10px; margin-top: 5px; margin-bottom: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 8px; font-size: 15px; }
        .botones { display: flex; gap: 8px; margin-top: 5px; }
        .botones button { flex: 1; margin-top: 0; }
        .btn-danger { background: #c62828; }
        .btn-danger:active { background: #b71c1c; }
        .btn-secondary { background: #757575; }
        .btn-secondary:active { background: #616161; }
        .oculto { display: none; }
        table { width: 100%; border-collapse: collapse; text-align: center; margin-top: 15px; margin-bottom: 15px; }
        th, td { border: 1px solid #bbb; padding: 8px; font-size: 14px; }
        th { background: #efefef; }
        .firmas { display: flex; justify-content: space-between; margin-top: 40px; text-align: center; font-size: 12px; color: #555; }
        .firmas div { flex: 1; }
        .descarga-aviso { color: #555; font-size: 12px; margin-top: -5px; margin-bottom: 10px; display: block; }

        @media print {
            body { background: white; padding: 0; margin: 0; }
            .card { box-shadow: none; padding: 0; margin: 0; }
            .no-print { display: none !important; }
            .salto-pagina { page-break-before: always !important; display: block; clear: both; }
            table { page-break-inside: avoid; }
            .firmas { page-break-inside: avoid; }
        }
    </style>
</head>
<body>

    <h1 class="no-print">Gestor Gastos Binotto</h1>
    <div id="app">Cargando base de datos local...</div>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(() => {});
        }

        let db = null;
        const app = document.getElementById('app');
        let viajesGlobales = []; 

        function iniciarDB() {
            return new Promise((resolve) => {
                let timeoutSeguridad = setTimeout(() => { resolve(false); }, 1200);
                try {
                    let request = indexedDB.open("GastosBinottoDB", 1);
                    request.onupgradeneeded = function(e) {
                        let database = e.target.result;
                        if (!database.objectStoreNames.contains("viajes")) {
                            database.createObjectStore("viajes", { keyPath: "id", autoIncrement: true });
                        }
                        if (!database.objectStoreNames.contains("gastos")) {
                            let gStore = database.createObjectStore("gastos", { keyPath: "id", autoIncrement: true });
                            gStore.createIndex("viaje_id", "viaje_id", { unique: false });
                        }
                    };
                    request.onsuccess = function(e) { clearTimeout(timeoutSeguridad); db = e.target.result; resolve(true); };
                    request.onerror = function() { clearTimeout(timeoutSeguridad); resolve(false); };
                    request.onblocked = function() { clearTimeout(timeoutSeguridad); resolve(false); };
                } catch(err) { clearTimeout(timeoutSeguridad); resolve(false); }
            });
        }

        function obtenerViajes(activo) {
            return new Promise((resolve) => {
                if(!db) return resolve([]);
                try {
                    let tx = db.transaction("viajes", "readonly");
                    let store = tx.objectStore("viajes");
                    let request = store.openCursor(null, "prev");
                    let resultados = [];
                    request.onsuccess = function(e) {
                        let cursor = e.target.result;
                        if (cursor) {
                            if (cursor.value.activo === activo) { resultados.push(cursor.value); }
                            cursor.continue();
                        } else { resolve(resultados); }
                    };
                    request.onerror = () => resolve([]);
                } catch(e) { resolve([]); }
            });
        }

        function obtenerViajePorId(id) {
            return new Promise(res => {
                if(!db) return res(null);
                try {
                    db.transaction("viajes").objectStore("viajes").get(id).onsuccess = e => res(e.target.result);
                } catch(err) { res(null); }
            });
        }

        function obtenerGastosPorViaje(viajeId) {
            return new Promise((resolve) => {
                if(!db) return resolve([]);
                try {
                    let tx = db.transaction("gastos", "readonly");
                    let index = tx.objectStore("gastos").index("viaje_id");
                    let request = index.openCursor(IDBKeyRange.only(viajeId));
                    let resultados = [];
                    request.onsuccess = function(e) {
                        let cursor = e.target.result;
                        if (cursor) { resultados.push(cursor.value); cursor.continue(); } 
                        else { resultados.sort((a, b) => new Date(b.fecha) - new Date(a.fecha)); resolve(resultados); }
                    };
                    request.onerror = () => resolve([]);
                } catch(e) { resolve([]); }
            });
        }

        async function cargarDatos() {
            await iniciarDB();
            viajesGlobales = await obtenerViajes(1);
            pantallaInicio();
        }

        function pantallaInicio() {
            let html = `
            <div class="card">
                <button onclick="nuevoViaje()">+ Nuevo viaje</button>
                <button class="btn-secondary" onclick="verArchivados()">Ver Archivados</button>
                <button onclick="exportarCopiaSeguridad()" style="background-color: #0288d1; color: white;">💾 Copia Seguridad (JSON)</button>
                <button onclick="importarCopiaSeguridad()" style="background-color: #7b1fa2; color: white; margin-top:8px;">📂 Importar Copia</button>
            </div>`;

            if (viajesGlobales.length === 0) {
                html += `<div class="card" style="text-align:center; color:#666;"><p>No hay viajes activos.</p></div>`;
            }

            viajesGlobales.forEach(v => {
                html += `
                <div class="card">
                    <h2 style="margin-top:0; margin-bottom:5px;">${v.nombre}</h2>
                    <small style="color:#555;">${v.inicio} hasta ${v.fin}</small><br>
                    <p style="margin: 8px 0;"><b>KM inicial:</b> ${v.km} km</p>
                    <div class="botones">
                        <button onclick="abrirViaje(${v.id})">Ver Gastos</button>
                        <button class="btn-secondary" onclick="archivarViaje(${v.id})">Archivar</button>
                    </div>
                    <div class="botones" style="margin-top:8px;">
                        <button class="btn-secondary" onclick="editarViaje(${v.id})">Editar</button>
                        <button class="btn-danger" onclick="borrarViaje(${v.id})">Borrar</button>
                    </div>
                </div>`;
            });
            app.innerHTML = html;
        }

        async function abrirViaje(id) {
            let viaje = await obtenerViajePorId(id);
            let gastos = await obtenerGastosPorViaje(id);
            if(!viaje) viaje = { nombre: "Viaje Temporal", inicio: "", fin: "", km: 0 };

            let html = `
            <div class="card">
                <button class="btn-secondary" onclick="cargarDatos()">← Volver al Inicio</button>
                <h2>Viaje: ${viaje.nombre}</h2>
                <div class="botones">
                    <button onclick="nuevoGasto(${id})">+ Añadir Gasto</button>
                    <button onclick="verInforme(${id})" style="background:#1565c0;">Generar Informe</button>
                </div>
            </div>`;

            if (gastos.length === 0) {
                html += `<div class="card" style="text-align:center; color:#666;"><p>No hay gastos registrados.</p></div>`;
            }

            gastos.forEach(g => {
                html += `
                <div class="card">
                    <div style="display:flex; justify-content:space-between;">
                        <b>${g.fecha} - ${g.concepto}</b>
                        <b style="color:#2e7d32; font-size:16px;">${parseFloat(g.importe).toFixed(2)} €</b>
                    </div>
                    <small style="color:#555;">Método: ${g.pago}</small>
                    ${g.archivo_foto ? `<br><small style="color:#1565c0;">💾 Archivo descargado: <b>${g.archivo_foto}</b></small>` : ''}
                    ${g.km ? `<br><small><b>KM Repostaje:</b> ${g.km} km</small>` : ''}
                    ${g.observaciones ? `<p style="margin:5px 0; background:#f0f0f0; padding:5px; border-radius:4px;">${g.observaciones}</p>` : ''}
                    <div class="botones" style="margin-top:10px;">
                        <button class="btn-secondary" onclick="editarGastoForm(${g.id},${id})">Editar</button>
                        <button class="btn-danger" onclick="borrarGasto(${g.id},${id})">Borrar</button>
                    </div>
                </div>`;
            });
            app.innerHTML = html;
        }

        async function verInforme(id) {
            let viaje = await obtenerViajePorId(id);
            let gastos = await obtenerGastosPorViaje(id);
            if(!viaje) viaje = { nombre: "Ruta", inicio: "", fin: "", km: 0 };
            let conceptos = ["GAS", "SOLRED", "HOTEL", "RESTAURACION", "TAXI", "COCHE", "VUELOS", "PARKING", "OTROS"];
            
            let filas = ""; let totalTarjeta = 0; let totalMetalico = 0; let categoriesTotales = {};
            gastos.forEach(g => { categoriesTotales[g.concepto] = (categoriesTotales[g.concepto] || 0) + parseFloat(g.importe); });

            conceptos.forEach(c => {
                let totalRow = categoriesTotales[c] || 0; let tarjeta = 0; let metalico = 0;
                gastos.forEach(g => {
                    if (g.concepto == c) {
                        let importe = parseFloat(g.importe) || 0;
                        if (c == "SOLRED" || c == "HOTEL") { tarjeta += importe; } 
                        else { if (g.pago == "TARJETA") tarjeta += importe; else metalico += importe; }
                    }
                });
                if (c !== "SOLRED" && c !== "HOTEL") { totalTarjeta += tarjeta; totalMetalico += metalico; }
                if (totalRow > 0 || tarjeta > 0 || metalico > 0) {
                    filas += `<tr><td><b>${c}</b></td><td>${metalico.toFixed(2)}€</td><td>${tarjeta.toFixed(2)}€</td><td style="background:#e8f5e9;"><b>${totalRow.toFixed(2)}€</b></td></tr>`;
                }
            });

            let sumaTotalesColumnas = totalMetalico + totalTarjeta;
            let kmHTML = "";
            let repostajes = gastos.filter(g => (g.concepto == "GAS" || g.concepto == "SOLRED") && g.km);
            repostajes.forEach((g, i) => { kmHTML += `<p style="margin:4px 0;">Repostaje ${i + 1} (${g.fecha}): <b>${g.km} km</b></p>`; });

            let filasDesglose = "";
            gastos.forEach(g => {
                filasDesglose += `<tr><td>${g.fecha}</td><td>${g.concepto}</td><td>${g.archivo_foto || 'Sin foto'}</td><td>${g.pago}</td><td>${parseFloat(g.importe).toFixed(2)}€</td></tr>`;
            });

            app.innerHTML = `
            <div class="card">
                <div class="botones no-print"><button class="btn-secondary" onclick="abrirViaje(${id})">← Volver</button><button onclick="window.print()" style="background:#e65100;">🖨️ Imprimir / PDF</button></div>
                <h1 style="text-align:center; font-size:20px;">INFORME DE GASTOS</h1>
                <p><b>Viaje:</b> ${viaje.nombre} | <b>Periodo:</b> ${viaje.inicio} - ${viaje.fin}</p>
                
                <h3>Resumen por Categorías</h3>
                <table>
                    <tr><th>Concepto</th><th>Metálico</th><th>Tarjeta</th><th>Total</th></tr>
                    ${filas ? filas : '<tr><td colspan="4">No hay gastos</td></tr>'}
                    <tr style="background:#c8e6c9;"><th>TOTALES</th><th>${totalMetalico.toFixed(2)}€</th><th>${totalTarjeta.toFixed(2)}€</th><th>${sumaTotalesColumnas.toFixed(2)}€</th></tr>
                </table>
                
                <h3>Kilometraje</h3><p><b>KM inicio viaje:</b> ${viaje.km} km</p>${kmHTML}
                
                <div class="firmas"><div>COMERCIAL<br><br>__________</div><div>ADMINISTRACIÓN<br><br>__________</div></div>

                <div class="salto-pagina">
                    <h3 style="margin-top: 20px;">Referencia de Archivos / Tickets</h3>
                    <table>
                        <tr><th>Fecha</th><th>Concepto</th><th>Nombre de Archivo Descargado</th><th>Pago</th><th>Importe</th></tr>
                        ${filasDesglose ? filasDesglose : '<tr><td colspan="5">No hay registros</td></tr>'}
                    </table>
                </div>
            </div>`;
        }

        function nuevoViaje() {
            app.innerHTML = `
            <div class="card">
                <h2>Nuevo viaje</h2>
                <label>Nombre del Viaje</label><input id="nombre" placeholder="Ej. Ruta Comercial">
                <label>Fecha inicio</label><input type="date" id="inicio">
                <label>Fecha fin</label><input type="date" id="fin">
                <label>KM inicial</label><input type="number" id="v_km" value="0">
                <button onclick="guardarViaje()">Guardar</button>
                <button class="btn-secondary" onclick="cargarDatos()">Cancelar</button>
            </div>`;
            document.getElementById('inicio').value = new Date().toISOString().split("T")[0];
            document.getElementById('fin').value = new Date().toISOString().split("T")[0];
        }

        async function guardarViaje() {
            let nombre = document.getElementById('nombre').value;
            if(!nombre) return alert("Introduce un nombre.");
            let nuevo = { nombre: nombre, inicio: document.getElementById('inicio').value, fin: document.getElementById('fin').value, km: parseInt(document.getElementById('v_km').value) || 0, activo: 1 };
            if(db) {
                let tx = db.transaction("viajes", "readwrite");
                tx.objectStore("viajes").add(nuevo);
                tx.oncomplete = () => cargarDatos();
            }
        }

        function nuevoGasto(viajeId) {
            let hoy = new Date().toISOString().split("T")[0];
            app.innerHTML = `
            <div class="card">
                <button class="btn-secondary" onclick="abrirViaje(${viajeId})">← Volver</button>
                <h2>Añadir gasto</h2>
                <label>Fecha</label><input type="date" id="fecha" value="${hoy}">
                <label>Concepto</label>
                <select id="concepto" onchange="controlKM()">
                    <option>GAS</option><option>SOLRED</option><option>HOTEL</option><option>RESTAURACION</option><option>TAXI</option><option>COCHE</option><option>VUELOS</option><option>PARKING</option><option>OTROS</option>
                </select>
                <label>Pago</label><select id="pago"><option>TARJETA</option><option>METALICO</option></select>
                <label>Importe (€)</label><input type="number" step="0.01" id="importe">
                <div id="kmzona" class="oculto"><label>KM actuales del coche</label><input type="number" id="g_km"></div>
                <label>Observaciones</label><input id="obs">
                <label>Hacer foto del Ticket</label>
                <input type="file" id="foto" accept="image/*" capture="environment">
                <small class="descarga-aviso">Al guardar, el ticket se guardará directamente en tu carpeta de Descargas.</small>
                <button onclick="dispararGuardado(${viajeId})">Guardar Gasto</button>
            </div>`;
            controlKM();
        }

        function controlKM() {
            let concepto = document.getElementById('concepto').value;
            document.getElementById('kmzona').className = (concepto == "GAS" || concepto == "SOLRED") ? "" : "oculto";
        }

        async function dispararGuardado(viajeId) {
            let importeVal = document.getElementById('importe').value;
            if(!importeVal || parseFloat(importeVal) <= 0) return alert("Pon un importe válido");

            let fecha = document.getElementById('fecha').value;
            let concepto = document.getElementById('concepto').value;
            let fotoInput = document.getElementById('foto');
            let nombreArchivoGenerado = null;

            if (fotoInput.files && fotoInput.files[0]) {
                nombreArchivoGenerado = `Gasto_${concepto}_${fecha}_${parseFloat(importeVal).toFixed(2)}E.jpg`;
                descargarArchivoDirecto(fotoInput.files[0], nombreArchivoGenerado);
            }

            let nuevoGastoObj = {
                viaje_id: viajeId,
                fecha: fecha,
                concepto: concepto,
                pago: document.getElementById('pago').value,
                importe: parseFloat(importeVal),
                km: document.getElementById('g_km').value ? parseInt(document.getElementById('g_km').value) : null,
                observaciones: document.getElementById('obs').value,
                archivo_foto: nombreArchivoGenerado
            };

            if(db) {
                let tx = db.transaction("gastos", "readwrite");
                tx.objectStore("gastos").add(nuevoGastoObj);
                tx.oncomplete = () => abrirViaje(viajeId);
            }
        }

        function descargarArchivoDirecto(file, nombre) {
            let url = URL.createObjectURL(file);
            let a = document.createElement('a');
            a.href = url;
            a.download = nombre;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        async function editarViaje(id) {
            let v = await obtenerViajePorId(id); if(!v) v = {nombre:"", inicio:"", fin:"", km:0};
            app.innerHTML = `<div class="card"><h2>Editar viaje</h2><input id="nombre" value="${v.nombre}"><input type="date" id="inicio" value="${v.inicio}"><input type="date" id="fin" value="${v.fin}"><input type="number" id="v_km" value="${v.km}"><button onclick="actualizarViaje(${id})">Actualizar</button></div>`;
        }
        function actualizarViaje(id) {
            if(!db) return cargarDatos();
            let tx = db.transaction("viajes", "readwrite"); let store = tx.objectStore("viajes");
            store.get(id).onsuccess = (e) => {
                let d = e.target.result; d.nombre = document.getElementById('nombre').value; d.inicio = document.getElementById('inicio').value; d.fin = document.getElementById('fin').value; d.km = parseInt(document.getElementById('v_km').value)||0; store.put(d);
            };
            tx.oncomplete = () => cargarDatos();
        }
        function archivarViaje(id) {
            if(!db) return;
            let tx = db.transaction("viajes", "readwrite"); let store = tx.objectStore("viajes");
            store.get(id).onsuccess = e => { let d = e.target.result; d.activo = 0; store.put(d); };
            tx.oncomplete = () => cargarDatos();
        }
        function borrarViaje(id) {
            if (!confirm("¿Borrar permanentemente?")) return;
            if(!db) return;
            let tx = db.transaction(["viajes", "gastos"], "readwrite"); tx.objectStore("viajes").delete(id);
            let index = tx.objectStore("gastos").index("viaje_id");
            index.openCursor(IDBKeyRange.only(id)).onsuccess = e => { let cursor = e.target.result; if(cursor){cursor.delete(); cursor.continue();} };
            tx.oncomplete = () => cargarDatos();
        }
        function editarGastoForm(gastoId, viajeId) {
            if(!db) return;
            db.transaction("gastos").objectStore("gastos").get(gastoId).onsuccess = e => {
                let g = e.target.result;
                app.innerHTML = `<div class="card"><h2>Editar gasto</h2><input type="date" id="fecha" value="${g.fecha}"><input type="number" step="0.01" id="importe" value="${g.importe}"><input id="obs" value="${g.observaciones||''}"><button onclick="actualizarGasto(${gastoId},${viajeId})">Actualizar</button></div>`;
            };
        }
        function actualizarGasto(gastoId, viajeId) {
            if(!db) return;
            let tx = db.transaction("gastos", "readwrite"); let store = tx.objectStore("gastos");
            store.get(gastoId).onsuccess = e => { let g = e.target.result; g.fecha = document.getElementById('fecha').value; g.importe = parseFloat(document.getElementById('importe').value); g.observaciones = document.getElementById('obs').value; store.put(g); };
            tx.oncomplete = () => abrirViaje(viajeId);
        }
        function borrarGasto(gastoId, viajeId) {
            if(!db) return;
            let tx = db.transaction("gastos", "readwrite"); tx.objectStore("gastos").delete(gastoId); tx.oncomplete = () => abrirViaje(viajeId);
        }
        async function verArchivados() {
            let datos = await obtenerViajes(0);
            let html = `<div class="card"><button class="btn-secondary" onclick="cargarDatos()">← Volver</button></div>`;
            datos.forEach(v => { html += `<div class="card"><h3>${v.nombre}</h3><small>${v.inicio} al ${v.fin}</small></div>`; });
            app.innerHTML = html;
        }
        function exportarCopiaSeguridad() {
            if(!db) return alert("Base de datos no vinculada aún.");
            let copia = { viajes: [], gastos: [] }; let tx = db.transaction(["viajes", "gastos"], "readonly");
            tx.objectStore("viajes").getAll().onsuccess = e => copia.viajes = e.target.result;
            tx.objectStore("gastos").getAll().onsuccess = e => copia.gastos = e.target.result;
            tx.oncomplete = () => {
                let blob = new Blob([JSON.stringify(copia)], { type: "application/json" });
                let a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `Backup_Gastos_${new Date().toISOString().split('T')[0]}.json`; a.click();
            };
        }
        function importarCopiaSeguridad() {
            if(!db) return alert("Sincroniza la app antes de importar.");
            let input = document.createElement('input'); input.type = 'file'; input.accept = '.json';
            input.onchange = e => {
                let reader = new FileReader();
                reader.onload = function(evt) {
                    let d = JSON.parse(evt.target.result);
                    let tx = db.transaction(["viajes", "gastos"], "readwrite");
                    tx.objectStore("viajes").clear(); tx.objectStore("gastos").clear();
                    d.viajes.forEach(v => tx.objectStore("viajes").add(v)); d.gastos.forEach(g => tx.objectStore("gastos").add(g));
                    tx.oncomplete = () => { alert("Restaurado"); cargarDatos(); };
                };
                reader.readAsText(e.target.files[0]);
            };
            input.click();
        }

        cargarDatos();
    </script>
</body>
</html>
